<text x="636" y="292" class="l">POST /v1/chat — route+infer</text><text x="636" y="312" class="l">POST /v1/eval/run — backfill</text><text x="636" y="332" class="l">GET /v1/metrics/* — dashboard</text><text x="636" y="352" class="l">/v1/experiments — A/B test</text><text x="636" y="372" class="l">/v1/keys — key CRUD</text><text x="636" y="392" class="l">/health · /v1/internal/*</text><text x="636" y="412" class="l">/v1/responses — explorer</text>
