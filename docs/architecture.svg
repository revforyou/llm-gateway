<text x="40" y="144" class="l">· ci-backend / frontend</text><text x="40" y="163" class="l">· keep-warm */5</text><text x="40" y="182" class="l">· traffic-engine */30</text><text x="40" y="201" class="l">· backfill-eval</text><text x="40" y="220" class="l">· drift-monitor</text><text x="40" y="239" class="l">· retrain-classifier</text><text x="40" y="262" class="l" font-style="italic" fill="#f0a860">cron throttled ~2h*</text>
