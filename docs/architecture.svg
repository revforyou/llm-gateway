<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="1160" viewBox="0 0 900 1160" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">
<title>LLM Quality Gateway full system design</title>
<desc>Detailed topology: clients, DNS and a Render load balancer reach a FastAPI gateway exposing REST endpoints; a classifier/router control plane and an LLM client data plane call Groq models; state lives in Upstash Redis and a Supabase Postgres cluster; an in-process LangGraph AI agent evaluates responses with Gemini; analytics, observability, cron and alerts sit around the edges.</desc>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#84add9"/></marker>
<style>
.b{fill:#163a4e;stroke:#5f8aa4;stroke-width:1}
.p{stroke:#a78bfa}.t2{stroke:#2dd4bf}.a{stroke:#fbbf24}.c{stroke:#fb923c}.bl{stroke:#60a5fa}
.buk{fill:none;stroke:#52809a;stroke-width:1;stroke-dasharray:5 4}
.t{fill:#eaf1f7;font-size:13px;font-weight:600;text-anchor:middle}
.s{fill:#a2bfcf;font-size:10.5px;text-anchor:middle}
.h{fill:#c2dae8;font-size:11.5px;font-weight:700;letter-spacing:.03em}
.l{fill:#b7d0df;font-size:10.5px}
.ln{stroke:#84add9;stroke-width:1.4;fill:none}
.lnd{stroke:#6f97ad;stroke-width:1.2;fill:none;stroke-dasharray:4 3}
.e{fill:#84add9;font-size:9.5px;font-style:italic;text-anchor:middle}
</style>
</defs>
