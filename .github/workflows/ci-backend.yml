name: ci-backend

on:
  push:
    paths: ["backend/**"]
  pull_request:
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic pydantic-settings supabase httpx redis "scikit-learn==1.4.2" "scipy==1.13.1" "numpy==1.26.4" "joblib==1.4.2" bcrypt tenacity python-jose sentry-sdk structlog groq google-generativeai pytest pytest-asyncio

      - name: Tests
        # conftest.py sets all required env vars — no real secrets needed for unit tests
        run: pytest tests/ -v
