name: ci-backend

on:
  push:
    paths: ["backend/**", ".github/workflows/ci-backend.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/ci-backend.yml"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # Install from pyproject.toml (dev extras) rather than a hand-maintained
        # package list — the manual list silently drifts from the real deps
        # (e.g. langgraph/langchain were added to pyproject but not here, which
        # broke test collection). This matches what the Dockerfile installs.
        run: pip install ".[dev]"

      - name: Tests
        # conftest.py sets all required env vars — no real secrets needed for unit tests
        run: pytest tests/ -v
