name: retrain-classifier

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 4am UTC
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ vars.BACKEND_DEPLOYED == 'true' }}

    permissions:
      contents: write   # needed to commit updated pkl + metrics

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install scikit-learn joblib numpy datasets supabase huggingface_hub

      - name: Retrain from eval feedback
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backend/scripts/retrain_from_feedback.py

      - name: Commit updated classifier if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/app/gateway/classifier.pkl backend/app/gateway/classifier_metrics.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Auto-retrain classifier from eval feedback [skip ci]" && \
            git push
