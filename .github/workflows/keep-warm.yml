name: keep-warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: ${{ vars.BACKEND_DEPLOYED == 'true' }}
    steps:
      - name: Ping backend health
        run: curl -fsS "${{ secrets.API_URL }}/health" || true

      - name: Ping keep-warm endpoint
        run: |
          curl -fsS -X POST "${{ secrets.API_URL }}/v1/internal/keep-warm" \
            -H "X-Cron-Secret: ${{ secrets.INTERNAL_CRON_SECRET }}" \
            -H "Content-Type: application/json" || true
